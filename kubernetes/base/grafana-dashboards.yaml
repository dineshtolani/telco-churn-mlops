apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: telcochurn
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  model_health.json: |
    {
      "title": "Model Health",
      "panels": [
        {
          "title": "Prediction Rate",
          "type": "graph",
          "targets": [{"expr": "rate(prediction_count_total[1m])", "legendFormat": "rate"}]
        },
        {
          "title": "Prediction Latency p95",
          "type": "graph",
          "targets": [{"expr": "histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m]))", "legendFormat": "p95"}]
        },
        {
          "title": "Churn vs Stay",
          "type": "graph",
          "targets": [
            {"expr": "rate(churn_predictions_total{prediction=\"Yes\"}[1m])", "legendFormat": "Churn"},
            {"expr": "rate(churn_predictions_total{prediction=\"No\"}[1m])", "legendFormat": "Stay"}
          ]
        }
      ],
      "schemaVersion": 27
    }
