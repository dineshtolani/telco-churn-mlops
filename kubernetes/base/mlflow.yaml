apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: telcochurn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/dineshtolani/telco-churn-mlops/mlflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin123"
            - name: MLFLOW_TRACKING_URI
              value: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: telcochurn
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
  type: ClusterIP
