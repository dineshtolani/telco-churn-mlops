# ArgoCD Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telcochurn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dineshtolani/telco-churn-mlops.git
    targetRevision: HEAD
    path: kubernetes/base
  destination:
    server: https://kubernetes.default.svc
    namespace: telcochurn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
