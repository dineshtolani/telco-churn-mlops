services:
  postgres:
    image: postgres:16
    container_name: telcochurn-postgres
    env_file: ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../../volumes/postgres:/var/lib/postgresql/data
    networks:
      - telcochurn

  minio:
    image: minio/minio:latest
    container_name: telcochurn-minio
    env_file: ./.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../../volumes/minio:/data
    networks:
      - telcochurn

  mlflow:
    build: ../mlflow
    container_name: telcochurn-mlflow
    env_file: ./.env
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "5000:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow
    depends_on:
      - postgres
      - minio
    networks:
      - telcochurn

  redis:
    image: redis:7
    container_name: telcochurn-redis
    ports:
      - "6379:6379"
    networks:
      - telcochurn

  airflow-postgres:
    image: postgres:16
    container_name: telcochurn-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - ../../volumes/airflow-db:/var/lib/postgresql/data
    networks:
      - telcochurn

  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    container_name: telcochurn-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/data
      - ../../training:/training
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    depends_on:
      - airflow-postgres
    networks:
      - telcochurn

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    container_name: telcochurn-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/data
      - ../../training:/training
    ports:
      - "8080:8080"
    command: airflow webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - telcochurn

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    container_name: telcochurn-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/data
      - ../../training:/training
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - telcochurn

  prometheus:
    image: prom/prometheus:latest
    container_name: telcochurn-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../prometheus/rules:/etc/prometheus/rules
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
    networks:
      - telcochurn

  tempo:
    image: grafana/tempo:2.5.0
    container_name: telcochurn-tempo
    ports:
      - "3200:3200"
    volumes:
      - ../tempo/tempo-config.yaml:/etc/tempo/config.yaml
      - ../../volumes/tempo:/var/tempo
    command:
      - "-config.file=/etc/tempo/config.yaml"
    networks:
      - telcochurn

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: telcochurn-otel
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9099:9099"
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otel/config.yaml
    command:
      - "--config=/etc/otel/config.yaml"
    networks:
      - telcochurn

  grafana:
    image: grafana/grafana:latest
    container_name: telcochurn-grafana
    ports:
      - "3000:3000"
    volumes:
      - ../grafana/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    depends_on:
      - prometheus
    networks:
      - telcochurn

networks:
  telcochurn:
    driver: bridge
